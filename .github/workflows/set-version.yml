name: Set Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  set-version:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Run set-version script
        run: ./scripts/set-version.sh "${{ github.event.inputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: "release/v${{ github.event.inputs.version }}"
          commit-message: "Bump version to v${{ github.event.inputs.version }}"
          title: "Bump version to v${{ github.event.inputs.version }}"
          body: "Automated version bump to v${{ github.event.inputs.version }}."
          base: main
