name: Android

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    concurrency:
      group: android-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Build Android Rust libraries
        run: ./scripts/build-android.sh aarch64-linux-android x86_64-linux-android

      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew --no-daemon testDebug

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

  release-apk:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Build Android Rust libraries
        run: ./scripts/build-android.sh aarch64-linux-android x86_64-linux-android

      - name: Build release APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Attach APK to GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
